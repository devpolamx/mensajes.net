<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="630" fill="#010f1a"/>

  <!-- Subtle grid overlay -->
  <line x1="0"    y1="105" x2="1200" y2="105" stroke="#012a4a" stroke-width="0.6" opacity="0.4"/>
  <line x1="0"    y1="210" x2="1200" y2="210" stroke="#012a4a" stroke-width="0.6" opacity="0.4"/>
  <line x1="0"    y1="315" x2="1200" y2="315" stroke="#012a4a" stroke-width="0.6" opacity="0.4"/>
  <line x1="0"    y1="420" x2="1200" y2="420" stroke="#012a4a" stroke-width="0.6" opacity="0.4"/>
  <line x1="0"    y1="525" x2="1200" y2="525" stroke="#012a4a" stroke-width="0.6" opacity="0.4"/>
  <line x1="300"  y1="0"   x2="300"  y2="630" stroke="#012a4a" stroke-width="0.6" opacity="0.4"/>
  <line x1="600"  y1="0"   x2="600"  y2="630" stroke="#012a4a" stroke-width="0.6" opacity="0.4"/>
  <line x1="900"  y1="0"   x2="900"  y2="630" stroke="#012a4a" stroke-width="0.6" opacity="0.4"/>

  <!-- Left cyan accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#06b6d4"/>

  <!-- Logo — embedded paths scaled 2.3x, centered at (230, 315) -->
  <g transform="translate(115, 200) scale(2.3)">
    <circle cx="50" cy="50" r="42" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4 8 20 6" fill="none" opacity="0.85"/>
    <circle cx="50" cy="50" r="32" stroke="#014f86" stroke-width="2.5" stroke-dasharray="45 15 30 10" fill="none"/>
    <circle cx="50" cy="50" r="24" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6 3 18 4" fill="none" opacity="0.9"/>
    <circle cx="50" cy="50" r="16" stroke="#012a4a" stroke-width="3" fill="none"/>
    <circle cx="50" cy="50" r="8"  fill="#06b6d4"/>
    <line x1="50" y1="12" x2="50" y2="20" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
    <line x1="50" y1="80" x2="50" y2="88" stroke="#014f86" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="50" x2="20" y2="50" stroke="#014f86" stroke-width="2" stroke-linecap="round"/>
    <line x1="80" y1="50" x2="88" y2="50" stroke="#06b6d4"  stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Vertical separator -->
  <line x1="460" y1="80" x2="460" y2="550" stroke="#012a4a" stroke-width="1" opacity="0.9"/>

  <!-- Label chip -->
  <rect x="500" y="148" width="340" height="28" rx="3" fill="#012a4a" stroke="#014f86" stroke-width="1"/>
  <text x="670" y="168" font-family="Arial, sans-serif" font-size="13" fill="#06b6d4" text-anchor="middle" letter-spacing="3">FIRMA ESTRAT&#201;GICA &#183; M&#201;XICO</text>

  <!-- Brand name -->
  <text x="500" y="280" font-family="Arial, sans-serif" font-weight="bold" font-size="88" fill="#ffffff" letter-spacing="-2">Mensajes<tspan fill="#06b6d4">.net</tspan></text>

  <!-- Separator under brand -->
  <line x1="500" y1="308" x2="1140" y2="308" stroke="#012a4a" stroke-width="1"/>

  <!-- Tagline -->
  <text x="500" y="360" font-family="Arial, sans-serif" font-size="28" fill="#06b6d4" letter-spacing="0.5">Inteligencia en Comunicaci&#243;n Estrat&#233;gica</text>

  <!-- Services -->
  <text x="500" y="410" font-family="Arial, sans-serif" font-size="18" fill="#3d6b7a">Posicionamiento &#183; Marketing Pol&#237;tico &#183; Comunicaci&#243;n de Crisis &#183; Pauta Inteligente</text>

  <!-- Area served badge -->
  <rect x="500" y="455" width="245" height="32" rx="3" fill="none" stroke="#012a4a" stroke-width="1"/>
  <text x="622" y="477" font-family="Arial, sans-serif" font-size="14" fill="#3d6b7a" text-anchor="middle">M&#233;xico &#38; Latinoam&#233;rica</text>

  <!-- URL -->
  <text x="500" y="555" font-family="Arial, sans-serif" font-size="18" fill="#1e3a4a" letter-spacing="1">mensajes.net</text>

</svg>
