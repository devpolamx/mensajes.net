<svg
  width="100"
  height="100"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="turquoiseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06b6d4" />
      <stop offset="50%"  stop-color="#00b4d8" />
      <stop offset="100%" stop-color="#014f86" />
    </linearGradient>
    <linearGradient id="petrolGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#012a4a" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Glow Background -->
  <circle cx="50" cy="50" r="35" fill="url(#centerGlow)" />

  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="42" stroke="url(#turquoiseGradient)" stroke-width="1.5" stroke-dasharray="4 8 20 6" opacity="0.85" />

  <!-- Second Ring -->
  <circle cx="50" cy="50" r="32" stroke="url(#petrolGradient)" stroke-width="2.5" stroke-dasharray="45 15 30 10" />

  <!-- Third Segmented Ring -->
  <circle cx="50" cy="50" r="24" stroke="url(#turquoiseGradient)" stroke-width="1.5" stroke-dasharray="6 3 18 4" opacity="0.9" />

  <!-- Inner Ring -->
  <circle cx="50" cy="50" r="16" stroke="url(#petrolGradient)" stroke-width="3" />

  <!-- Solid Center Core -->
  <circle cx="50" cy="50" r="8" fill="url(#turquoiseGradient)" filter="url(#glowEffect)" />

  <!-- Axis Lines -->
  <line x1="50" y1="12" x2="50" y2="20" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" />
  <line x1="50" y1="80" x2="50" y2="88" stroke="#014f86" stroke-width="2" stroke-linecap="round" />
  <line x1="12" y1="50" x2="20" y2="50" stroke="#014f86" stroke-width="2" stroke-linecap="round" />
  <line x1="80" y1="50" x2="88" y2="50" stroke="#06b6d4"  stroke-width="2" stroke-linecap="round" />
</svg>
